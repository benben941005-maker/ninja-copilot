<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0D0D1A">
    <title>Ninja Co-Pilot</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{margin:0;background:#0D0D1A;font-family:'DM Sans',sans-serif;overflow:hidden}
        input::placeholder{color:rgba(255,255,255,0.25)}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:rgba(227,24,55,0.4);border-radius:2px}
        #app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:500px;margin:0 auto;background:#0D0D1A}

        .hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
        .hdr-l{display:flex;align-items:center;gap:8px}
        .hdr-logo{width:32px;height:32px;border-radius:8px;background:#E31837;display:flex;align-items:center;justify-content:center;font-size:16px}
        .hdr-t{color:#fff;font-weight:700;font-size:13px}
        .hdr-t span{color:#E31837}
        .hdr-s{color:rgba(255,255,255,0.35);font-size:9px;letter-spacing:1px}

        /* Language bar */
        .lang-bar{display:flex;gap:4px;padding:6px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,0.04)}
        .lang-bar::-webkit-scrollbar{display:none}
        .lang-btn{padding:4px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.2s}
        .lang-btn.active{background:#E31837;color:#fff;border-color:#E31837}

        /* Location bar */
        .loc-bar{padding:8px 14px;background:rgba(76,175,80,0.08);border-bottom:1px solid rgba(76,175,80,0.15);flex-shrink:0;display:flex;align-items:center;gap:8px}
        .loc-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;box-shadow:0 0 6px #4CAF50;animation:pulse 2s infinite;flex-shrink:0}
        .loc-label{color:rgba(255,255,255,0.4);font-size:9px;font-weight:600;letter-spacing:0.5px}
        .loc-addr{color:#fff;font-size:12px;font-weight:600}
        .loc-bar.no-gps{background:rgba(255,87,34,0.08);border-color:rgba(255,87,34,0.15)}
        .loc-bar.no-gps .loc-dot{background:#FF5722;box-shadow:0 0 6px #FF5722}
        .loc-bar.no-gps .loc-addr{color:#FF5722}

        .chips{display:flex;gap:5px;padding:6px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
        .chips::-webkit-scrollbar{display:none}
        .chip{padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
        .chip:active{background:rgba(255,255,255,0.1)}

        .chat{flex:1;overflow-y:auto;padding:10px 10px 6px}
        .mr{display:flex;margin-bottom:8px}.mr.u{justify-content:flex-end}.mr.a{justify-content:flex-start}
        .av{width:26px;height:26px;border-radius:8px;background:#E31837;display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:6px;flex-shrink:0;margin-top:2px}
        .bb{max-width:78%;padding:10px 13px;color:#fff;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
        .bb.u{background:#E31837;border-radius:14px 14px 4px 14px}
        .bb.a{background:rgba(255,255,255,0.07);border-radius:14px 14px 14px 4px}
        .bb img{width:100%;max-height:120px;object-fit:contain;border-radius:8px;margin-bottom:6px;display:block}
        .proc{color:rgba(255,255,255,0.3);font-size:12px;padding:6px 40px}

        .unit-card{background:linear-gradient(135deg,#E31837,#c41230);border-radius:14px;padding:16px;margin:8px 0;text-align:center}
        .unit-card .unit-label{color:rgba(255,255,255,0.7);font-size:10px;font-weight:600;letter-spacing:1px;margin-bottom:4px}
        .unit-card .unit-num{color:#fff;font-size:36px;font-weight:700;letter-spacing:2px}
        .unit-card .unit-addr{color:rgba(255,255,255,0.8);font-size:12px;margin-top:6px}
        .unit-card .unit-lang{display:inline-block;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:8px;font-size:10px;color:rgba(255,255,255,0.7);margin-top:6px}

        .anav{background:rgba(255,255,255,0.05);border:1px solid rgba(76,175,80,0.3);border-radius:12px;padding:14px;margin:8px 0}
        .anav-title{color:#4CAF50;font-size:10px;font-weight:600;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .anav-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:pulse 1s infinite}
        .mf{border-radius:10px;overflow:hidden;margin-bottom:10px;border:2px solid #E31837}
        .mf iframe{display:block;border:0}
        .anav-btns{display:flex;gap:6px}
        .anav-btns button{flex:1;padding:10px 6px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
        .bg{background:#4285F4;color:#fff}
        .bw{background:#33CCFF;color:#000}

        .sb{padding:5px 14px;display:none;align-items:center;justify-content:space-between;background:rgba(227,24,55,0.08);border-top:1px solid rgba(227,24,55,0.15)}
        .sb span{color:#E31837;font-size:11px;font-weight:600}
        .sb button{padding:3px 10px;border-radius:10px;border:1px solid #E31837;background:transparent;color:#E31837;font-size:11px;font-weight:600;cursor:pointer}

        /* iOS big tap button — shows after AI speaks */
        .ios-tap{display:none;padding:12px 14px;flex-shrink:0;border-top:1px solid rgba(227,24,55,0.15)}
        .ios-tap.show{display:block}
        .ios-tap button{width:100%;padding:20px;border-radius:14px;border:none;background:#E31837;color:#fff;font-size:18px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;animation:glow 1.5s infinite}
        .ios-tap .ios-hint{color:rgba(255,255,255,0.3);font-size:10px;text-align:center;margin-top:6px}

        /* Mic bar */
        .mic-bar{padding:6px 14px;display:none;align-items:center;justify-content:center;gap:8px;background:rgba(227,24,55,0.06);border-top:1px solid rgba(227,24,55,0.1)}
        .mic-bar.on{display:flex}
        .mic-pulse{width:8px;height:8px;border-radius:50%;background:#E31837;animation:pulse 1s infinite}
        .mic-bar span{color:#E31837;font-size:11px;font-weight:600}

        .ib{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.3);flex-shrink:0}
        .ir{display:flex;gap:6px;align-items:center;margin-bottom:8px}
        .ir input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#fff;font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
        .snd{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:#fff;font-size:14px;cursor:pointer;flex-shrink:0}
        .snd.on{background:#E31837}
        .ar{display:flex;gap:6px}
        .ar button{flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:2px}
        .ar button span:first-child{font-size:18px}
        .ar button span:last-child{font-size:9px;font-weight:600}
        .vb{background:#E31837;color:#fff;flex:2!important;flex-direction:row!important;gap:8px!important;justify-content:center}
        .vb.active{background:#ff4444;animation:glow 1.5s infinite}
        .vb span:last-child{font-size:13px!important;font-weight:700!important}
        .scb{background:rgba(255,255,255,0.06);color:#fff}
        .plb{background:rgba(255,255,255,0.06);color:#fff}
        .nvb{background:rgba(227,24,55,0.15);color:#E31837}

        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(227,24,55,0.4)}50%{box-shadow:0 0 20px rgba(227,24,55,0.8)}}
    </style>
</head>
<body>
<div id="app">
    <div class="hdr">
        <div class="hdr-l">
            <div class="hdr-logo">🥷</div>
            <div><div class="hdr-t"><span>NINJA</span> CO-PILOT</div><div class="hdr-s">AI SENIOR DRIVER ASSISTANT</div></div>
        </div>
    </div>
    <div class="lang-bar" id="langBar"></div>
    <div class="loc-bar no-gps" id="locBar">
        <div class="loc-dot"></div>
        <div><div class="loc-label">YOUR LOCATION</div><div class="loc-addr" id="locAddr">Locating...</div></div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="chat" id="chat"></div>
    <div class="sb" id="sb"><span>🔊 Speaking...</span><button id="stopBtn">Stop</button></div>

    <!-- iOS: big tap button after AI speaks -->
    <div class="ios-tap" id="iosTap">
        <button id="iosTapBtn">🎙️ TAP TO SPEAK AGAIN</button>
        <div class="ios-hint">iPhone requires tap each time to listen</div>
    </div>

    <div class="mic-bar" id="micBar"><div class="mic-pulse"></div><span id="micLabel">HANDS-FREE MIC ACTIVE</span></div>
    <div class="ib">
        <div class="ir">
            <input type="text" id="inp" placeholder="Type or speak in any language...">
            <button class="snd" id="sendBtn">▶</button>
        </div>
        <div class="ar">
            <button class="vb" id="voiceBtn"><span>🎙️</span><span>TAP TO SPEAK</span></button>
            <button class="scb" id="scanBtn"><span>📷</span><span>SCAN</span></button>
            <button class="plb" id="photoBtn"><span>🖼️</span><span>PHOTO</span></button>
            <button class="nvb" id="navBtn"><span>🚗</span><span>NAV</span></button>
        </div>
        <input type="file" id="cameraIn" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="photoIn" accept="image/*" style="display:none">
    </div>
</div>
<script src="ai-driver-copilot.js"></script>
</body>
</html>
