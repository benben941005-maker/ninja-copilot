<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0D0D1A" />
  <title>Ninja Co-Pilot</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:#0D0D1A;font-family:'DM Sans',sans-serif;overflow:hidden}
    input::placeholder{color:rgba(255,255,255,0.25)}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:rgba(227,24,55,0.4);border-radius:2px}

    #app{
      height:100vh;height:100dvh;display:flex;flex-direction:column;
      max-width:500px;margin:0 auto;background:#0D0D1A
    }

    .hdr{
      padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0
    }

    .hdr-l{display:flex;align-items:center;gap:8px}
    .hdr-logo{
      width:32px;height:32px;border-radius:8px;background:#E31837;
      display:flex;align-items:center;justify-content:center;font-size:16px
    }

    .hdr-t{color:#fff;font-weight:700;font-size:13px}
    .hdr-t span{color:#E31837}
    .hdr-s{color:rgba(255,255,255,0.35);font-size:9px;letter-spacing:1px}

    .top-actions{display:flex;gap:8px}
    .mini-btn{
      min-width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);color:#fff;font-size:18px;cursor:pointer
    }
    .mini-btn.on{background:rgba(76,175,80,0.18);border-color:rgba(76,175,80,0.5)}

    .loc-bar{
      padding:10px 14px;background:rgba(255,87,34,0.08);
      border-bottom:1px solid rgba(255,87,34,0.15);flex-shrink:0;display:flex;align-items:center;gap:8px
    }
    .loc-dot{
      width:8px;height:8px;border-radius:50%;background:#FF5722;
      box-shadow:0 0 6px #FF5722;animation:pulse 2s infinite;flex-shrink:0
    }
    .loc-label{color:rgba(255,255,255,0.4);font-size:9px;font-weight:600;letter-spacing:0.5px}
    .loc-addr{color:#FF7A45;font-size:12px;font-weight:600}
    .loc-bar.good{background:rgba(76,175,80,0.08);border-color:rgba(76,175,80,0.15)}
    .loc-bar.good .loc-dot{background:#4CAF50;box-shadow:0 0 6px #4CAF50}
    .loc-bar.good .loc-addr{color:#fff}

    .chips{display:flex;gap:5px;padding:6px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
    .chips::-webkit-scrollbar{display:none}
    .chip{
      padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);font-size:11px;
      font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif
    }

    .chat{flex:1;overflow-y:auto;padding:10px 10px 6px}
    .mr{display:flex;margin-bottom:8px}
    .mr.u{justify-content:flex-end}
    .mr.a{justify-content:flex-start}

    .av{
      width:26px;height:26px;border-radius:8px;background:#E31837;display:flex;
      align-items:center;justify-content:center;font-size:13px;margin-right:6px;flex-shrink:0;margin-top:2px
    }

    .bb{
      max-width:82%;padding:10px 13px;color:#fff;font-size:13.5px;line-height:1.5;
      white-space:pre-wrap;word-break:break-word
    }
    .bb.u{background:#E31837;border-radius:14px 14px 4px 14px}
    .bb.a{background:rgba(255,255,255,0.07);border-radius:14px 14px 14px 4px}

    .map-card{
      margin:8px 0;background:rgba(255,255,255,0.05);border:1px solid rgba(76,175,80,0.2);
      border-radius:14px;padding:12px
    }
    .map-title{font-size:12px;color:#4CAF50;font-weight:700;margin-bottom:8px}
    .map-actions{display:flex;gap:8px;margin-top:10px}
    .map-actions button{
      flex:1;padding:10px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer
    }
    .gm{background:#4285F4;color:#fff}
    .ap{background:#111;color:#fff;border:1px solid rgba(255,255,255,0.12)}

    .proc{color:rgba(255,255,255,0.3);font-size:12px;padding:6px 40px}

    .sb{
      padding:5px 14px;display:none;align-items:center;justify-content:space-between;
      background:rgba(227,24,55,0.08);border-top:1px solid rgba(227,24,55,0.15)
    }
    .sb span{color:#E31837;font-size:11px;font-weight:600}
    .sb button{
      padding:3px 10px;border-radius:10px;border:1px solid #E31837;background:transparent;
      color:#E31837;font-size:11px;font-weight:600;cursor:pointer
    }

    .ib{
      padding:10px 14px;border-top:1px solid rgba(255,255,255,0.06);
      background:rgba(0,0,0,0.3);flex-shrink:0
    }
    .ir{display:flex;gap:6px;align-items:center;margin-bottom:8px}
    .ir input{
      flex:1;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);color:#fff;font-size:13px;outline:none;font-family:'DM Sans',sans-serif
    }
    .snd{
      width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);
      color:#fff;font-size:14px;cursor:pointer;flex-shrink:0
    }
    .snd.on{background:#E31837}

    .ar{display:flex;gap:6px}
    .ar button{
      flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
      display:flex;flex-direction:column;align-items:center;gap:2px
    }
    .ar button span:first-child{font-size:18px}
    .ar button span:last-child{font-size:9px;font-weight:600}
    .vb{background:#E31837;color:#fff;flex:2!important;flex-direction:row!important;gap:8px!important;justify-content:center}
    .vb span:last-child{font-size:13px!important;font-weight:700!important}
    .scb{background:rgba(255,255,255,0.06);color:#fff}
    .plb{background:rgba(255,255,255,0.06);color:#fff}
    .nvb{background:rgba(76,175,80,0.16);color:#4CAF50}
    .lvb{background:rgba(33,150,243,0.15);color:#2196F3}

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  </style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-logo">🥷</div>
      <div>
        <div class="hdr-t"><span>NINJA</span> CO-PILOT</div>
        <div class="hdr-s">AI SENIOR DRIVER ASSISTANT</div>
      </div>
    </div>
    <div class="top-actions">
      <button class="mini-btn" id="gpsBtn" title="Retry GPS">📍</button>
    </div>
  </div>

  <div class="loc-bar" id="locBar">
    <div class="loc-dot"></div>
    <div>
      <div class="loc-label">YOUR LOCATION</div>
      <div class="loc-addr" id="locAddr">Locating...</div>
    </div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="chat" id="chat"></div>

  <div class="sb" id="sb">
    <span>🔊 Speaking...</span>
    <button id="stopBtn">Stop</button>
  </div>

  <div class="ib">
    <div class="ir">
      <input type="text" id="inp" placeholder="Type or speak in any language...">
      <button class="snd" id="sendBtn">▶</button>
    </div>
    <div class="ar">
      <button class="vb" id="voiceBtn"><span>🎙️</span><span>TAP TO SPEAK</span></button>
      <button class="scb" id="scanBtn"><span>📷</span><span>SCAN</span></button>
      <button class="plb" id="photoBtn"><span>🖼️</span><span>PHOTO</span></button>
      <button class="nvb" id="mapBtn"><span>🗺️</span><span>MAP</span></button>
      <button class="lvb" id="liveBtn"><span>📡</span><span>LIVE</span></button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  const chatEl = document.getElementById("chat");
  const inp = document.getElementById("inp");
  const sendBtn = document.getElementById("sendBtn");
  const voiceBtn = document.getElementById("voiceBtn");
  const mapBtn = document.getElementById("mapBtn");
  const liveBtn = document.getElementById("liveBtn");
  const stopBtn = document.getElementById("stopBtn");
  const gpsBtn = document.getElementById("gpsBtn");
  const locBar = document.getElementById("locBar");
  const locAddr = document.getElementById("locAddr");
  const sb = document.getElementById("sb");
  const chipsEl = document.getElementById("chips");

  let gpsPos = null;
  let currentAddress = "";
  let gpsWatchId = null;
  let recognition = null;
  let lastDestAddress = "";
  let liveTracking = true;

  const CHIPS = [
    "Where am I?",
    "Go to IMM",
    "Navigate to Jurong Point",
    "Show my location",
    "Nearest petrol station",
    "Nearest toilet"
  ];

  CHIPS.forEach(text => {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = text;
    b.onclick = () => sendText(text);
    chipsEl.appendChild(b);
  });

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function scrollDown() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addBubble(role, text) {
    const row = document.createElement("div");
    row.className = "mr " + (role === "user" ? "u" : "a");

    let html = "";
    if (role === "assistant") html += '<div class="av">🥷</div>';
    html += '<div class="bb ' + (role === "user" ? "u" : "a") + '">' + esc(text) + '</div>';

    row.innerHTML = html;
    chatEl.appendChild(row);
    scrollDown();
  }

  function showProc() {
    hideProc();
    const el = document.createElement("div");
    el.className = "proc";
    el.id = "proc";
    el.textContent = "Processing...";
    chatEl.appendChild(el);
    scrollDown();
  }

  function hideProc() {
    const el = document.getElementById("proc");
    if (el) el.remove();
  }

  function setLocState(status, text) {
    locAddr.textContent = text;

    if (status === "good") {
      locBar.classList.add("good");
    } else {
      locBar.classList.remove("good");
    }
  }

  function speak(text) {
    try {
      if (!window.speechSynthesis || !text) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.0;
      u.pitch = 1.0;
      u.onstart = () => sb.style.display = "flex";
      u.onend = () => sb.style.display = "none";
      u.onerror = () => sb.style.display = "none";
      window.speechSynthesis.speak(u);
    } catch (_) {}
  }

  stopBtn.onclick = function () {
    try { window.speechSynthesis.cancel(); } catch (_) {}
    sb.style.display = "none";
  };

  async function reverseGeocode(lat, lng) {
    try {
      const r = await fetch(`/api/geocode?lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lng)}`);
      const d = await r.json();
      if (d && d.address) {
        currentAddress = d.address;
        setLocState("good", d.address);
      } else {
        setLocState("bad", `${lat.toFixed(5)}, ${lng.toFixed(5)}`);
      }
    } catch (_) {
      setLocState("bad", `${lat.toFixed(5)}, ${lng.toFixed(5)}`);
    }
  }

  function geolocationErrorMessage(err) {
    if (!window.isSecureContext) {
      return "GPS blocked: site is not secure HTTPS.";
    }

    if (!err) return "Unable to detect location.";

    switch (err.code) {
      case 1:
        return "Location blocked. Allow GPS in Safari/Chrome settings.";
      case 2:
        return "Location unavailable. Move to open sky and retry.";
      case 3:
        return "GPS timeout. Tap 📍 to retry.";
      default:
        return "Unable to detect location.";
    }
  }

  async function checkPermissionAndStart() {
    if (!("geolocation" in navigator)) {
      setLocState("bad", "GPS not supported on this phone.");
      addBubble("assistant", "This phone/browser does not support GPS.");
      return;
    }

    if (!window.isSecureContext) {
      setLocState("bad", "HTTPS required for GPS.");
      addBubble("assistant", "Open the app with HTTPS. Browser GPS will not work on insecure pages.");
      return;
    }

    setLocState("bad", "Locating...");
    startGPS();
  }

  function startGPS() {
    if (gpsWatchId) {
      try { navigator.geolocation.clearWatch(gpsWatchId); } catch (_) {}
      gpsWatchId = null;
    }

    navigator.geolocation.getCurrentPosition(
      async function (pos) {
        gpsPos = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          acc: pos.coords.accuracy
        };
        gpsBtn.classList.add("on");
        await reverseGeocode(gpsPos.lat, gpsPos.lng);
      },
      function (err) {
        gpsBtn.classList.remove("on");
        const msg = geolocationErrorMessage(err);
        setLocState("bad", msg);
        addBubble("assistant", msg);
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      }
    );

    gpsWatchId = navigator.geolocation.watchPosition(
      async function (pos) {
        if (!liveTracking) return;

        gpsPos = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          acc: pos.coords.accuracy
        };
        gpsBtn.classList.add("on");
        await reverseGeocode(gpsPos.lat, gpsPos.lng);
      },
      function (err) {
        gpsBtn.classList.remove("on");
        setLocState("bad", geolocationErrorMessage(err));
      },
      {
        enableHighAccuracy: true,
        timeout: 20000,
        maximumAge: 3000
      }
    );
  }

  async function openGoogleMapTo(destAddress) {
    if (!destAddress) return;

    if (gpsPos) {
      const url = `https://www.google.com/maps/dir/${gpsPos.lat},${gpsPos.lng}/${encodeURIComponent(destAddress)}`;
      window.open(url, "_blank");
    } else {
      const url = `https://www.google.com/maps/search/${encodeURIComponent(destAddress)}`;
      window.open(url, "_blank");
    }
  }

  function showMapCard(destAddress) {
    const wrap = document.createElement("div");
    wrap.className = "mr a";

    const source = gpsPos
      ? `https://www.google.com/maps?saddr=${gpsPos.lat},${gpsPos.lng}&daddr=${encodeURIComponent(destAddress)}&output=embed`
      : `https://www.google.com/maps?q=${encodeURIComponent(destAddress)}&z=15&output=embed`;

    wrap.innerHTML = `
      <div class="av">🥷</div>
      <div class="bb a" style="padding:0;background:transparent;max-width:88%">
        <div class="map-card">
          <div class="map-title">Route to: ${esc(destAddress)}</div>
          <div style="border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)">
            <iframe
              src="${source}"
              width="100%"
              height="180"
              style="border:0;display:block"
              loading="lazy"
              allowfullscreen>
            </iframe>
          </div>
          <div class="map-actions">
            <button class="gm" id="gmBtnTemp">Open Google Maps</button>
            <button class="ap" id="apBtnTemp">Use Apple/Browser Map</button>
          </div>
        </div>
      </div>
    `;

    chatEl.appendChild(wrap);
    scrollDown();

    document.getElementById("gmBtnTemp").onclick = () => openGoogleMapTo(destAddress);
    document.getElementById("apBtnTemp").onclick = () => {
      const url = `http://maps.apple.com/?daddr=${encodeURIComponent(destAddress)}`;
      window.open(url, "_blank");
    };

    document.getElementById("gmBtnTemp").id = "";
    document.getElementById("apBtnTemp").id = "";
  }

  async function sendText(textArg) {
    const text = (textArg || inp.value || "").trim();
    if (!text) return;

    addBubble("user", text);
    inp.value = "";
    sendBtn.classList.remove("on");
    showProc();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          text,
          lat: gpsPos ? gpsPos.lat : null,
          lng: gpsPos ? gpsPos.lng : null,
          address: currentAddress
        })
      });

      const data = await res.json();
      hideProc();

      const reply = data.reply || "Something went wrong.";
      addBubble("assistant", reply);
      speak(reply);

      if (data.dest_address) {
        lastDestAddress = data.dest_address;
        showMapCard(lastDestAddress);
      }

      if (data.show_my_location && currentAddress) {
        addBubble("assistant", "Current location: " + currentAddress);
      }
    } catch (e) {
      hideProc();
      addBubble("assistant", "Cannot reach server.");
    }
  }

  function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      addBubble("assistant", "Voice input not supported in this browser. Please type.");
      return;
    }

    if (recognition) {
      try { recognition.stop(); } catch (_) {}
    }

    recognition = new SR();
    recognition.lang = "en-SG";
    recognition.continuous = false;
    recognition.interimResults = false;

    voiceBtn.style.opacity = "0.7";

    recognition.onresult = function (e) {
      const text = e.results[0][0].transcript;
      voiceBtn.style.opacity = "1";
      sendText(text);
    };

    recognition.onerror = function () {
      voiceBtn.style.opacity = "1";
      addBubble("assistant", "Mic not available. Please allow microphone permission.");
    };

    recognition.onend = function () {
      voiceBtn.style.opacity = "1";
    };

    try {
      recognition.start();
    } catch (_) {
      voiceBtn.style.opacity = "1";
    }
  }

  sendBtn.onclick = () => sendText();
  inp.addEventListener("input", () => {
    sendBtn.classList.toggle("on", !!inp.value.trim());
  });
  inp.addEventListener("keydown", function (e) {
    if (e.key === "Enter") sendText();
  });

  voiceBtn.onclick = startVoice;

  mapBtn.onclick = function () {
    if (lastDestAddress) {
      showMapCard(lastDestAddress);
      return;
    }
    if (currentAddress) {
      addBubble("assistant", "You are near " + currentAddress);
      const url = gpsPos
        ? `https://www.google.com/maps?q=${gpsPos.lat},${gpsPos.lng}`
        : `https://www.google.com/maps/search/${encodeURIComponent(currentAddress)}`;
      window.open(url, "_blank");
    } else {
      addBubble("assistant", "GPS not ready yet. Tap 📍 to retry.");
    }
  };

  liveBtn.onclick = function () {
    liveTracking = !liveTracking;
    liveBtn.style.opacity = liveTracking ? "1" : "0.55";
    addBubble("assistant", liveTracking ? "Live GPS tracking is on." : "Live GPS tracking is paused.");
  };

  gpsBtn.onclick = function () {
    addBubble("assistant", "Retrying GPS...");
    checkPermissionAndStart();
  };

  document.getElementById("scanBtn").onclick = function () {
    addBubble("assistant", "Scan function placeholder is ready. Next step is reconnect OCR.");
  };

  document.getElementById("photoBtn").onclick = function () {
    addBubble("assistant", "Photo function placeholder is ready. Next step is reconnect vision AI.");
  };

  addBubble(
    "assistant",
    "Ready. I will try to lock your GPS now.\nIf location stays stuck, tap 📍 and allow location permission in browser."
  );

  checkPermissionAndStart();
})();
</script>
</body>
</html>
