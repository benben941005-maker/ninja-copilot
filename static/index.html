<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ninja Co-Pilot</title>

<style>

body{
background:#0d0d1a;
color:white;
font-family:Arial;
margin:0;
}

.header{
padding:14px;
background:#111;
font-weight:bold;
font-size:18px;
}

.chat{
height:60vh;
overflow:auto;
padding:10px;
}

.msg{
margin:8px 0;
padding:10px;
border-radius:10px;
max-width:80%;
}

.user{
background:#e31837;
margin-left:auto;
}

.bot{
background:#2a2a40;
}

.controls{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
}

input{
width:70%;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
margin-left:6px;
border:none;
border-radius:6px;
background:#e31837;
color:white;
font-weight:bold;
}

#micBtn{
background:#444;
}

</style>

</head>

<body>

<div class="header">
🥷 Ninja Co-Pilot
</div>

<div class="chat" id="chat"></div>

<div class="controls">

<input id="textInput" placeholder="Type or speak..." />

<button onclick="sendMsg()">Send</button>

<button id="micBtn">🎤</button>

</div>

<script>

const chat = document.getElementById("chat")
const textInput = document.getElementById("textInput")

function addMsg(text,cls){

const d = document.createElement("div")

d.className = "msg " + cls

d.innerText = text

chat.appendChild(d)

chat.scrollTop = chat.scrollHeight

}

async function sendMsg(){

let txt = textInput.value.trim()

if(!txt)return

addMsg(txt,"user")

textInput.value=""

try{

const res = await fetch("/chat",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({

messages:[
{role:"user",content:txt}
]

})

})

const data = await res.json()

let reply = data.reply || "OK"

addMsg(reply,"bot")

if(data.dest_address){

navigate(data.dest_address)

}

}catch(e){

addMsg("Connection error","bot")

}

}

function navigate(addr){

const url =
"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(addr)

window.open(url,"_blank")

}






/* =========================
VOICE RECOGNITION
========================= */

let recognition

if ('webkitSpeechRecognition' in window){

recognition = new webkitSpeechRecognition()

recognition.continuous=false

recognition.interimResults=false

recognition.lang="en-SG"

recognition.onresult=function(e){

let txt=e.results[0][0].transcript

textInput.value=txt

sendMsg()

}

}




document.getElementById("micBtn").onclick=function(){

if(recognition){

recognition.start()

}else{

alert("Voice not supported on this browser")

}

}




/* =========================
AUTO LANGUAGE DETECT
========================= */

textInput.addEventListener("input",function(){

let v=this.value

if(/[\u4e00-\u9fff]/.test(v)) recognition.lang="zh-CN"
else if(/[ก-๙]/.test(v)) recognition.lang="th-TH"
else if(/[ぁ-んァ-ン]/.test(v)) recognition.lang="ja-JP"
else recognition.lang="en-SG"

})

</script>

</body>
</html>
