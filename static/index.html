<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0D0D1A">
    <title>Ninja Co-Pilot</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{margin:0;background:#0D0D1A;font-family:'DM Sans',sans-serif;overflow:hidden}
        input::placeholder{color:rgba(255,255,255,0.25)}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:rgba(227,24,55,0.4);border-radius:2px}
        #app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:500px;margin:0 auto;background:#0D0D1A}

        .hdr{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
        .hdr-l{display:flex;align-items:center;gap:8px}
        .hdr-logo{width:32px;height:32px;border-radius:8px;background:#E31837;display:flex;align-items:center;justify-content:center;font-size:16px}
        .hdr-t{color:#fff;font-weight:700;font-size:13px}.hdr-t span{color:#E31837}
        .hdr-s{color:rgba(255,255,255,0.35);font-size:9px;letter-spacing:1px}
        .hdr-r{display:flex;align-items:center;gap:6px}

        /* WEATHER BADGE */
        .wx-badge{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08)}
        .wx-icon{font-size:14px;line-height:1}
        .wx-info{display:flex;flex-direction:column}
        .wx-temp{color:#fff;font-size:11px;font-weight:700;line-height:1.2}
        .wx-desc{color:rgba(255,255,255,0.4);font-size:9px;letter-spacing:0.3px;max-width:55px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .wx-badge.rain{background:rgba(30,144,255,0.15);border-color:rgba(30,144,255,0.3)}

        /* TRANSPORT MODE */
        .mode-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:0.3px;border:1px solid;white-space:nowrap}
        .mode-driving{background:rgba(76,175,80,0.15);border-color:rgba(76,175,80,0.3);color:#4CAF50}
        .mode-walking{background:rgba(255,193,7,0.15);border-color:rgba(255,193,7,0.3);color:#FFC107}
        .mode-mrt{background:rgba(33,150,243,0.15);border-color:rgba(33,150,243,0.3);color:#2196F3}
        .mode-unknown{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.08);color:rgba(255,255,255,0.35)}

        .lang-bar{display:flex;gap:4px;padding:6px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,0.04)}
        .lang-bar::-webkit-scrollbar{display:none}
        .lang-btn{padding:4px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.2s}
        .lang-btn.active{background:#E31837;color:#fff;border-color:#E31837}

        .loc-bar{padding:6px 14px;background:rgba(76,175,80,0.08);border-bottom:1px solid rgba(76,175,80,0.15);flex-shrink:0;display:flex;align-items:center;gap:8px}
        .loc-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
        .loc-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;box-shadow:0 0 6px #4CAF50;animation:pulse 2s infinite;flex-shrink:0}
        .loc-info{min-width:0}
        .loc-label{color:rgba(255,255,255,0.4);font-size:9px;font-weight:600;letter-spacing:0.5px}
        .loc-addr{color:#fff;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
        .loc-acc{display:flex;align-items:center;gap:5px;margin-top:2px}
        .loc-acc-pill{padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:0.3px;white-space:nowrap}
        .acc-good{background:rgba(76,175,80,0.2);color:#4CAF50;border:1px solid rgba(76,175,80,0.3)}
        .acc-ok{background:rgba(255,193,7,0.2);color:#FFC107;border:1px solid rgba(255,193,7,0.3)}
        .acc-poor{background:rgba(255,87,34,0.2);color:#FF5722;border:1px solid rgba(255,87,34,0.3)}
        .loc-coords{color:rgba(255,255,255,0.3);font-size:9px;font-family:monospace;letter-spacing:0.2px}
        .loc-source{color:rgba(255,255,255,0.25);font-size:8px;letter-spacing:0.5px;font-weight:600}
        .loc-bar.no-gps{background:rgba(255,87,34,0.08);border-color:rgba(255,87,34,0.15)}
        .loc-bar.no-gps .loc-dot{background:#FF5722;box-shadow:0 0 6px #FF5722}
        .loc-bar.no-gps .loc-addr{color:#FF5722}

        /* MAP PANEL */
        #mapPanel{flex-shrink:0;position:relative;overflow:hidden;transition:height 0.35s cubic-bezier(.4,0,.2,1)}
        #mapPanel.hidden{height:0!important}
        #liveMap{height:100%;width:100%}
        .map-controls{position:absolute;top:6px;right:6px;z-index:1000;display:flex;flex-direction:column;gap:4px}
        .map-ctrl-btn{width:30px;height:30px;border-radius:8px;border:none;background:rgba(13,13,26,0.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);font-family:'DM Sans',sans-serif;font-weight:700}
        .map-ctrl-btn:active{background:rgba(227,24,55,0.7)}
        .map-mode-bar{position:absolute;bottom:6px;left:6px;z-index:1000;display:flex;gap:4px}
        .map-mode-pill{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;backdrop-filter:blur(6px);transition:all 0.2s}
        .map-mode-pill.active{background:#E31837;color:#fff}
        .map-mode-pill:not(.active){background:rgba(13,13,26,0.85);color:rgba(255,255,255,0.55)}
        .leaflet-control-attribution{font-size:7px!important;opacity:0.3!important}

        .chips{display:flex;gap:5px;padding:6px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
        .chips::-webkit-scrollbar{display:none}
        .chip{padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
        .chip:active{background:rgba(255,255,255,0.1)}

        .chat{flex:1;overflow-y:auto;padding:10px 10px 6px}
        .mr{display:flex;margin-bottom:8px}.mr.u{justify-content:flex-end}.mr.a{justify-content:flex-start}
        .av{width:26px;height:26px;border-radius:8px;background:#E31837;display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:6px;flex-shrink:0;margin-top:2px}
        .bb{max-width:78%;padding:10px 13px;color:#fff;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
        .bb.u{background:#E31837;border-radius:14px 14px 4px 14px}
        .bb.a{background:rgba(255,255,255,0.07);border-radius:14px 14px 14px 4px}
        .bb img{width:100%;max-height:120px;object-fit:contain;border-radius:8px;margin-bottom:6px;display:block}
        .proc{color:rgba(255,255,255,0.3);font-size:12px;padding:6px 40px}

        .unit-card{background:linear-gradient(135deg,#E31837,#c41230);border-radius:14px;padding:16px;margin:8px 0;text-align:center}
        .unit-card .unit-label{color:rgba(255,255,255,0.7);font-size:10px;font-weight:600;letter-spacing:1px;margin-bottom:4px}
        .unit-card .unit-num{color:#fff;font-size:36px;font-weight:700;letter-spacing:2px}
        .unit-card .unit-addr{color:rgba(255,255,255,0.8);font-size:12px;margin-top:6px}
        .unit-card .unit-lang{display:inline-block;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:8px;font-size:10px;color:rgba(255,255,255,0.7);margin-top:6px}
        .anav{background:rgba(255,255,255,0.05);border:1px solid rgba(76,175,80,0.3);border-radius:12px;padding:14px;margin:8px 0}
        .anav-title{color:#4CAF50;font-size:10px;font-weight:600;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .anav-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:pulse 1s infinite}
        .mf{border-radius:10px;overflow:hidden;margin-bottom:10px;border:2px solid #E31837}
        .mf iframe{display:block;border:0}
        .anav-btns{display:flex;gap:6px}
        .anav-btns button{flex:1;padding:10px 6px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
        .bg{background:#4285F4;color:#fff}.bw{background:#33CCFF;color:#000}

        .sb{padding:5px 14px;display:none;align-items:center;justify-content:space-between;background:rgba(227,24,55,0.08);border-top:1px solid rgba(227,24,55,0.15)}
        .sb span{color:#E31837;font-size:11px;font-weight:600}
        .sb button{padding:3px 10px;border-radius:10px;border:1px solid #E31837;background:transparent;color:#E31837;font-size:11px;font-weight:600;cursor:pointer}
        .mic-bar{padding:6px 14px;display:none;align-items:center;justify-content:center;gap:8px;background:rgba(227,24,55,0.06);border-top:1px solid rgba(227,24,55,0.1)}
        .mic-bar.on{display:flex}
        .mic-pulse{width:8px;height:8px;border-radius:50%;background:#E31837;animation:pulse 1s infinite}
        .mic-bar span{color:#E31837;font-size:11px;font-weight:600}

        /* ── LIVE NAV-CAM OVERLAY ─────────────────────────── */
        #camOverlay{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;bottom:0;z-index:9999;display:none;flex-direction:column;background:#000}
        #camOverlay.active{display:flex}

        /* Full-screen video background */
        #camVideo{position:absolute;top:0;left:0;right:0;bottom:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:0}


        /* Nav step banner — top overlay */
        #camNavBanner{position:absolute;top:0;left:0;right:0;z-index:10;padding:10px 14px;background:linear-gradient(to bottom,rgba(0,0,0,0.82),transparent);display:none;flex-direction:column;gap:4px}
        #camNavBanner.show{display:flex}
        .cnb-label{color:rgba(255,255,255,0.5);font-size:9px;font-weight:700;letter-spacing:1px}
        .cnb-step{color:#fff;font-size:15px;font-weight:700;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
        .cnb-eta{color:rgba(255,255,255,0.6);font-size:11px;margin-top:2px}

        /* Mini map PiP — bottom-left */
        #camMapPip{position:absolute;bottom:130px;left:12px;z-index:10;width:120px;height:120px;border-radius:12px;overflow:hidden;border:2px solid rgba(227,24,55,0.7);box-shadow:0 4px 16px rgba(0,0,0,0.6);display:none}
        #camMapPip.show{display:block}
        #camPipMap{width:100%;height:100%}

        /* AI reply bubble — bottom overlay above controls */
        #camAiReply{position:absolute;bottom:126px;right:12px;left:140px;z-index:10;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);border-radius:12px;padding:10px;color:#fff;font-size:12px;line-height:1.4;max-height:90px;overflow-y:auto;display:none;border:1px solid rgba(255,255,255,0.1)}
        #camAiReply.show{display:block}

        /* Controls bar — bottom */
        .cam-controls-bar{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:12px 14px 18px;background:linear-gradient(to top,rgba(0,0,0,0.88),transparent);display:flex;flex-direction:column;gap:8px}
        .cam-status{color:rgba(255,255,255,0.5);font-size:10px;font-weight:600;letter-spacing:0.5px;text-align:center}
        .cam-btn-row{display:flex;gap:8px;align-items:center}
        .cam-snap{flex:2;padding:12px;border-radius:12px;border:none;background:#E31837;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
        .cam-auto-toggle{flex:1;padding:12px 8px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;letter-spacing:0.3px}
        .cam-auto-toggle.on{background:rgba(227,24,55,0.2);border-color:rgba(227,24,55,0.4);color:#E31837}

        /* EXIT button — prominent top-right */
        #camExitBtn{position:absolute;top:12px;right:12px;z-index:20;width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.6);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);font-family:'DM Sans',sans-serif;font-weight:700;line-height:1}
        #camExitBtn:active{background:rgba(227,24,55,0.7)}

        .ib{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.3);flex-shrink:0}
        .ir{display:flex;gap:6px;align-items:center;margin-bottom:8px}
        .ir input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#fff;font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
        .snd{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:#fff;font-size:14px;cursor:pointer;flex-shrink:0}
        .snd.on{background:#E31837}
        .ar{display:flex;gap:4px}
        .ar button{flex:1;padding:9px 4px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:2px}
        .ar button span:first-child{font-size:15px}.ar button span:last-child{font-size:8px;font-weight:700;letter-spacing:0.2px}
        .vb{background:#E31837;color:#fff;flex:2!important;flex-direction:row!important;gap:6px!important;justify-content:center}
        .vb.active{background:#ff4444;animation:glow 1.5s infinite}
        .vb span:last-child{font-size:11px!important;font-weight:700!important}
        .scb{background:rgba(255,255,255,0.06);color:#fff}
        .plb{background:rgba(255,255,255,0.06);color:#fff}
        .nvb{background:rgba(227,24,55,0.15);color:#E31837}
        .lcb{background:rgba(33,150,243,0.12);color:#2196F3}
        .mpb{background:rgba(76,175,80,0.12);color:#4CAF50;transition:all 0.2s}
        .mpb.on{background:rgba(76,175,80,0.3);color:#66BB6A}

        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(227,24,55,0.4)}50%{box-shadow:0 0 20px rgba(227,24,55,0.8)}}
    </style>
</head>
<body>
<div id="app">
    <div class="hdr">
        <div class="hdr-l">
            <div class="hdr-logo">🥷</div>
            <div><div class="hdr-t"><span>NINJA</span> CO-PILOT</div><div class="hdr-s">AI SENIOR DRIVER ASSISTANT</div></div>
        </div>
        <div class="hdr-r">
            <div class="wx-badge" id="wxBadge" style="display:none">
                <span class="wx-icon" id="wxIcon">🌤</span>
                <div class="wx-info">
                    <div class="wx-temp" id="wxTemp">--°C</div>
                    <div class="wx-desc" id="wxDesc">--</div>
                </div>
            </div>
            <div class="mode-badge mode-unknown" id="modeBadge">🚗 --</div>
        </div>
    </div>
    <div class="lang-bar" id="langBar"></div>
    <div class="loc-bar no-gps" id="locBar">
        <div class="loc-left">
            <div class="loc-dot"></div>
            <div class="loc-info">
                <div class="loc-label">YOUR LOCATION <span class="loc-source" id="locSource"></span></div>
                <div class="loc-addr" id="locAddr">Locating...</div>
                <div class="loc-acc" id="locAcc" style="display:none">
                    <span class="loc-acc-pill acc-ok" id="locAccPill">± --m</span>
                    <span class="loc-coords" id="locCoords"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- MAP PANEL: hidden by default, shows when MAP toggled or nav active -->
    <div id="mapPanel" class="hidden" style="height:200px">
        <div id="liveMap"></div>
        <div class="map-controls">
            <button class="map-ctrl-btn" id="mapZoomIn">+</button>
            <button class="map-ctrl-btn" id="mapZoomOut">−</button>
            <button class="map-ctrl-btn" id="mapCenter">◎</button>
            <button class="map-ctrl-btn" id="mapClose">✕</button>
        </div>
        <div class="map-mode-bar">
            <button class="map-mode-pill active" id="mpDriving">🚗 Drive</button>
            <button class="map-mode-pill" id="mpWalking">🚶 Walk</button>
        </div>
    </div>

    <div class="chips" id="chips"></div>
    <div class="chat" id="chat"></div>
    <div class="sb" id="sb"><span>🔊 Speaking...</span><button id="stopBtn">Stop</button></div>
    <div class="mic-bar" id="micBar"><div class="mic-pulse"></div><span id="micLabel">HANDS-FREE MIC ACTIVE</span></div>
    <div class="ib">
        <div class="ir">
            <input type="text" id="inp" placeholder="Type or speak in any language...">
            <button class="snd" id="sendBtn">▶</button>
        </div>
        <div class="ar">
            <button class="vb" id="voiceBtn"><span>🎙️</span><span>TAP TO SPEAK</span></button>
            <button class="scb" id="scanBtn"><span>📷</span><span>SCAN</span></button>
            <button class="plb" id="photoBtn"><span>🖼️</span><span>PHOTO</span></button>
            <button class="mpb" id="mapBtn"><span>🗺️</span><span>MAP</span></button>
            <button class="lcb" id="liveCamBtn"><span>📹</span><span>LIVE</span></button>
        </div>
        <input type="file" id="cameraIn" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="photoIn" accept="image/*" style="display:none">
    </div>
</div>

<!-- ── LIVE NAV-CAM OVERLAY ─────────────────────── -->
<div id="camOverlay">
    <!-- Full-screen camera feed -->
    <video id="camVideo" autoplay muted playsinline></video>

    <!-- EXIT button (always visible top-right) -->
    <button id="camExitBtn" title="Exit camera">✕</button>

    <!-- Nav step banner (top) — shows current nav step -->
    <div id="camNavBanner">
        <div class="cnb-label">🧭 NEXT STEP</div>
        <div class="cnb-step" id="camNavStep">Waiting for navigation...</div>
        <div class="cnb-eta" id="camNavEta"></div>
    </div>

    <!-- Mini map PiP (bottom-left) -->
    <div id="camMapPip">
        <div id="camPipMap"></div>
    </div>

    <!-- AI reply bubble (bottom-right) -->
    <div id="camAiReply">Tap 📸 to analyze what the camera sees...</div>

    <!-- Bottom controls bar -->
    <div class="cam-controls-bar">
        <div class="cam-status" id="camStatus">📹 LIVE — Point at road sign, block, or parcel</div>
        <div class="cam-btn-row">
            <button class="cam-snap" id="camSnap">📸 Analyze</button>
            <button class="cam-auto-toggle" id="camAutoToggle">🔄 AUTO<br>OFF</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="ai-driver-copilot.js"></script>
</body>
</html>
