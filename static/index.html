<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0D0D1A">
    <title>Ninja Co-Pilot</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{margin:0;background:#0D0D1A;font-family:'DM Sans',sans-serif;overflow:hidden}
        input::placeholder{color:rgba(255,255,255,0.25)}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:rgba(227,24,55,0.4);border-radius:2px}
        #app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:500px;margin:0 auto;background:#0D0D1A}
        .hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
        .hdr-l{display:flex;align-items:center;gap:8px}
        .hdr-logo{width:32px;height:32px;border-radius:8px;background:#E31837;display:flex;align-items:center;justify-content:center;font-size:16px}
        .hdr-t{color:#fff;font-weight:700;font-size:13px}
        .hdr-t span{color:#E31837}
        .hdr-s{color:rgba(255,255,255,0.35);font-size:9px;letter-spacing:1px}
        .gps{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600}
        .gps-dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
        .chips{display:flex;gap:5px;padding:8px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
        .chips::-webkit-scrollbar{display:none}
        .chip{padding:5px 10px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
        .chip:active{background:rgba(255,255,255,0.1)}
        .chat{flex:1;overflow-y:auto;padding:10px 10px 6px}
        .mr{display:flex;margin-bottom:8px}.mr.u{justify-content:flex-end}.mr.a{justify-content:flex-start}
        .av{width:26px;height:26px;border-radius:8px;background:#E31837;display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:6px;flex-shrink:0;margin-top:2px}
        .bb{max-width:78%;padding:10px 13px;color:#fff;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
        .bb.u{background:#E31837;border-radius:14px 14px 4px 14px}
        .bb.a{background:rgba(255,255,255,0.07);border-radius:14px 14px 14px 4px}
        .bb img{width:100%;max-height:120px;object-fit:contain;border-radius:8px;margin-bottom:6px;display:block}
        .proc{color:rgba(255,255,255,0.3);font-size:12px;padding:6px 40px}
        .nbtn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#4CAF50,#2E7D32);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin:6px 0}
        .mf{border-radius:10px;overflow:hidden;margin-bottom:8px;border:2px solid #E31837}
        .mf iframe{display:block;border:0}
        .np{background:rgba(255,255,255,0.05);border-radius:10px;padding:14px;border:1px solid rgba(227,24,55,0.2)}
        .nh{display:flex;justify-content:space-between;margin-bottom:6px}
        .ns{color:rgba(255,255,255,0.4);font-size:10px;font-weight:600}
        .nd{color:#E31837;font-size:10px;font-weight:600}
        .ni{display:flex;align-items:center;gap:8px;margin-bottom:12px}
        .ni-i{font-size:24px}.ni-t{color:#fff;font-size:14px;font-weight:600}
        .npg{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:10px}
        .npf{height:100%;background:#E31837;border-radius:2px;transition:width 0.3s}
        .nbs{display:flex;gap:6px}
        .nbs button{flex:1;padding:9px;border-radius:8px;font-weight:600;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif}
        .bk{border:1px solid rgba(255,255,255,0.12);background:transparent;color:#fff}
        .spk{border:none;background:#E31837;color:#fff;flex:2!important}
        .spk.on{background:#ff6b6b}
        .nx{border:none;background:#fff;color:#0D0D1A}
        .dis{opacity:0.3;pointer-events:none}
        .cn{width:100%;margin-top:6px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:rgba(255,255,255,0.4);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
        .sb{padding:5px 14px;display:none;align-items:center;justify-content:space-between;background:rgba(227,24,55,0.08);border-top:1px solid rgba(227,24,55,0.15)}
        .sb span{color:#E31837;font-size:11px;font-weight:600}
        .sb button{padding:3px 10px;border-radius:10px;border:1px solid #E31837;background:transparent;color:#E31837;font-size:11px;font-weight:600;cursor:pointer}
        .ib{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.3);flex-shrink:0}
        .ir{display:flex;gap:6px;align-items:center;margin-bottom:8px}
        .ir input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#fff;font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
        .snd{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:#fff;font-size:14px;cursor:pointer;flex-shrink:0}
        .snd.on{background:#E31837}
        .ar{display:flex;gap:6px}
        .vb{flex:2;padding:12px;border-radius:10px;border:none;background:#E31837;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
        .vb.lis{background:#ff4444}
        .scb,.nvb,.plb{flex:1;padding:12px;border-radius:10px;border:none;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:1px}
        .scb{background:rgba(255,255,255,0.06)}
        .plb{background:rgba(255,255,255,0.06)}
        .nvb{background:rgba(227,24,55,0.15);color:#E31837}
        .scb span:first-child,.nvb span:first-child,.plb span:first-child{font-size:18px}
        .scb span:last-child,.nvb span:last-child,.plb span:last-child{font-size:9px;font-weight:600}
        .mic-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.04)}
        .mic-toggle span{color:rgba(255,255,255,0.4);font-size:10px;font-weight:600}
        .toggle{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,0.15);position:relative;cursor:pointer;border:none;transition:background 0.2s}
        .toggle.on{background:#E31837}
        .toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left 0.2s}
        .toggle.on::after{left:18px}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    </style>
</head>
<body>
<div id="app">
    <div class="hdr">
        <div class="hdr-l">
            <div class="hdr-logo">🥷</div>
            <div><div class="hdr-t"><span>NINJA</span> CO-PILOT</div><div class="hdr-s">AI SENIOR DRIVER ASSISTANT</div></div>
        </div>
        <div id="gps" class="gps"></div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="chat" id="chat"></div>
    <div class="sb" id="sb"><span>🔊 Speaking...</span><button id="stopBtn">Stop</button></div>
    <div class="mic-toggle">
        <span>🎙️ ALWAYS-ON MIC</span>
        <button class="toggle" id="micToggle"></button>
    </div>
    <div class="ib">
        <div class="ir">
            <input type="text" id="inp" placeholder="Type or speak in any language...">
            <button class="snd" id="sendBtn">▶</button>
        </div>
        <div class="ar">
            <button class="vb" id="voiceBtn">🎙️ TAP TO SPEAK</button>
            <button class="scb" id="scanBtn"><span>📷</span><span>SCAN</span></button>
            <button class="plb" id="photoBtn"><span>🖼️</span><span>PHOTO</span></button>
            <button class="nvb" id="navBtn"><span>🚗</span><span>NAV</span></button>
        </div>
        <!-- camera capture -->
        <input type="file" id="cameraIn" accept="image/*" capture="environment" style="display:none">
        <!-- photo library (no capture = shows gallery picker) -->
        <input type="file" id="photoIn" accept="image/*" style="display:none">
    </div>
</div>
<script src="ai-driver-copilot.js"></script>
</body>
</html>
