<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0D0D1A">
    <title>Ninja Co-Pilot | AI Driver Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #0D0D1A; font-family: 'DM Sans', sans-serif; overflow: hidden; }
        input::placeholder { color: rgba(255,255,255,0.25); }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(227,24,55,0.4); border-radius: 2px; }

        /* ─── Layout ─── */
        #app {
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
            max-width: 500px; margin: 0 auto;
            background: #0D0D1A;
        }

        /* ─── Header ─── */
        .header {
            padding: 10px 14px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .header-logo {
            width: 32px; height: 32px; border-radius: 8px; background: #E31837;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }
        .header-title { color: #fff; font-weight: 700; font-size: 13px; }
        .header-title span { color: #E31837; }
        .header-sub { color: rgba(255,255,255,0.35); font-size: 9px; letter-spacing: 1px; }
        .gps-badge {
            display: flex; align-items: center; gap: 4px;
            padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
        }
        .gps-dot {
            width: 6px; height: 6px; border-radius: 50%;
            animation: pulse 2s infinite;
        }

        /* ─── Quick Chips ─── */
        .chips {
            display: flex; gap: 5px; padding: 8px 14px;
            overflow-x: auto; flex-shrink: 0;
            scrollbar-width: none;
        }
        .chips::-webkit-scrollbar { display: none; }
        .chip {
            padding: 5px 10px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.6);
            font-size: 11px; font-weight: 500;
            cursor: pointer; white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
        }
        .chip:active { background: rgba(255,255,255,0.1); }

        /* ─── Chat ─── */
        .chat {
            flex: 1; overflow-y: auto; padding: 10px 10px 6px;
        }
        .msg-row {
            display: flex; margin-bottom: 8px;
        }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.assistant { justify-content: flex-start; }
        .msg-avatar {
            width: 26px; height: 26px; border-radius: 8px; background: #E31837;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; margin-right: 6px; flex-shrink: 0; margin-top: 2px;
        }
        .msg-bubble {
            max-width: 78%; padding: 10px 13px; color: #fff;
            font-size: 13.5px; line-height: 1.5;
            white-space: pre-wrap; word-break: break-word;
        }
        .msg-bubble.user {
            background: #E31837; border-radius: 14px 14px 4px 14px;
        }
        .msg-bubble.assistant {
            background: rgba(255,255,255,0.07); border-radius: 14px 14px 14px 4px;
        }
        .msg-bubble img {
            width: 100%; max-height: 120px; object-fit: contain;
            border-radius: 8px; margin-bottom: 6px; display: block;
        }
        .processing { color: rgba(255,255,255,0.3); font-size: 12px; padding: 6px 40px; }

        /* ─── Navigate Button ─── */
        .nav-btn {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: #fff; font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            margin: 6px 0;
        }

        /* ─── Map ─── */
        .map-frame {
            border-radius: 10px; overflow: hidden; margin-bottom: 8px;
            border: 2px solid #E31837;
        }
        .map-frame iframe { display: block; border: 0; }

        /* ─── Nav Panel ─── */
        .nav-panel {
            background: rgba(255,255,255,0.05); border-radius: 10px;
            padding: 14px; border: 1px solid rgba(227,24,55,0.2);
        }
        .nav-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .nav-step-label { color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 600; }
        .nav-dist { color: #E31837; font-size: 10px; font-weight: 600; }
        .nav-instruction { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .nav-icon { font-size: 24px; }
        .nav-text { color: #fff; font-size: 14px; font-weight: 600; }
        .nav-progress {
            height: 3px; background: rgba(255,255,255,0.08);
            border-radius: 2px; margin-bottom: 10px;
        }
        .nav-progress-fill {
            height: 100%; background: #E31837; border-radius: 2px;
            transition: width 0.3s;
        }
        .nav-buttons { display: flex; gap: 6px; }
        .nav-buttons button {
            flex: 1; padding: 9px; border-radius: 8px; font-weight: 600;
            cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif;
        }
        .btn-back { border: 1px solid rgba(255,255,255,0.12); background: transparent; color: #fff; }
        .btn-speak { border: none; background: #E31837; color: #fff; flex: 2 !important; }
        .btn-speak.active { background: #ff6b6b; }
        .btn-next { border: none; background: #fff; color: #0D0D1A; }
        .btn-disabled { opacity: 0.3; pointer-events: none; }
        .close-nav {
            width: 100%; margin-top: 6px; padding: 8px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08); background: transparent;
            color: rgba(255,255,255,0.4); font-size: 11px; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }

        /* ─── Speaking Bar ─── */
        .speaking-bar {
            padding: 5px 14px; display: flex; align-items: center;
            justify-content: space-between;
            background: rgba(227,24,55,0.08);
            border-top: 1px solid rgba(227,24,55,0.15);
        }
        .speaking-bar span { color: #E31837; font-size: 11px; font-weight: 600; }
        .speaking-bar button {
            padding: 3px 10px; border-radius: 10px; border: 1px solid #E31837;
            background: transparent; color: #E31837; font-size: 11px;
            font-weight: 600; cursor: pointer;
        }

        /* ─── Input Bar ─── */
        .input-bar {
            padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.3); flex-shrink: 0;
        }
        .input-row {
            display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
        }
        .input-row input {
            flex: 1; padding: 10px 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #fff; font-size: 13px; outline: none;
            font-family: 'DM Sans', sans-serif;
        }
        .send-btn {
            width: 38px; height: 38px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.06); color: #fff;
            font-size: 14px; cursor: pointer; flex-shrink: 0;
        }
        .send-btn.active { background: #E31837; }
        .action-row { display: flex; gap: 6px; }
        .btn-voice {
            flex: 2; padding: 12px; border-radius: 10px; border: none;
            background: #E31837; color: #fff; font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
        }
        .btn-voice.listening { background: #ff4444; }
        .btn-scan, .btn-nav-shortcut {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            color: #fff; cursor: pointer; font-family: 'DM Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center; gap: 1px;
        }
        .btn-scan { background: rgba(255,255,255,0.06); }
        .btn-nav-shortcut { background: rgba(76,175,80,0.12); color: #4CAF50; }
        .btn-scan span:first-child, .btn-nav-shortcut span:first-child { font-size: 18px; }
        .btn-scan span:last-child, .btn-nav-shortcut span:last-child { font-size: 9px; font-weight: 600; }

        /* ─── Animations ─── */
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-logo">🥷</div>
                <div>
                    <div class="header-title"><span>NINJA</span> CO-PILOT</div>
                    <div class="header-sub">AI SENIOR DRIVER ASSISTANT</div>
                </div>
            </div>
            <div id="gps-badge" class="gps-badge"></div>
        </div>

        <!-- Quick Chips -->
        <div class="chips" id="chips"></div>

        <!-- Chat -->
        <div class="chat" id="chat"></div>

        <!-- Speaking Bar -->
        <div class="speaking-bar" id="speaking-bar" style="display:none">
            <span>🔊 Speaking...</span>
            <button onclick="stopSpeak()">Stop</button>
        </div>

        <!-- Input Bar -->
        <div class="input-bar">
            <div class="input-row">
                <input type="text" id="text-input" placeholder="Type or speak in any language..." onkeydown="if(event.key==='Enter')sendText()">
                <button class="send-btn" id="send-btn" onclick="sendText()">▶</button>
            </div>
            <div class="action-row">
                <button class="btn-voice" id="voice-btn" onclick="toggleListen()">
                    🎙️ TAP TO SPEAK
                </button>
                <button class="btn-scan" onclick="document.getElementById('file-input').click()">
                    <span>📷</span><span>SCAN</span>
                </button>
                <button class="btn-nav-shortcut" id="nav-shortcut" style="display:none" onclick="startNav()">
                    <span>🚗</span><span>NAV</span>
                </button>
            </div>
            <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleScan(event)">
        </div>
    </div>

    <script src="ai-driver-copilot.js"></script>
</body>
</html>
